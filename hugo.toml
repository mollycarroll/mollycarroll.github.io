# config file reference: https://gohugo.io/getting-started/configuration/

# The root configuration keys are: [build, caches, cascade, deployment, frontmatter, imaging, languages, markup, mediatypes, menus, minify, module, outputformats, outputs, params, permalinks, privacy, related, security, segments, server, services, sitemap, and taxonomies]

baseURL = "/"
languageCode = "en-us"
pluralizelisttitles = false   # removes the automatically appended "s" on sidebar entries
enableRobotsTXT = true

# NOTE: If using Disqus as commenting engine, uncomment and configure this line
# disqusShortname = "yourDisqusShortname"

[params]
    front_page_content = ["about"]

    brand = "Molly Carroll"
    # brand_image = "/images/brand_image.png"    # path to the image shown in the sidebar
    description = '' # Used as default meta description if not specified in front matter
    dark_mode = false                      # optional - defaults to false
    # favicon = "favicon.png"             # path to favicon (defaults to favicon.png)
    hideToc = false

    # MENU PLACEHOLDER
    # Menu dict keys:
        # Name:         The name to display on the menu.
        # URL:          The directory relative to the content directory.
        # HasChildren:  If the directory"s files should be listed.  Default is true.
        # Limit:        If the files should be listed, how many should be shown.

    # TODO: revise menu config
    menu = [
        {Name = "About", URL = "/about/", HasChildren = true, Limit = 2},
        {Name = "Projects", URL = "/projects/", HasChildren = true, Limit = 3},
    ]

    # Links to your socials.  Comment or delete any you don"t need/use. 
    # discord_url = "https://discord.com"
    # email_url = "mailto://user@domain"
    facebook_url = "https://facebook.com/madsciai"
    github_url = "https://github.com/mollycarroll"
    instagram_url = "https://instagram.com/madsciai"
    linkedin_url = "https://linkedin.com/mollyacarroll"
    youtube_url = "https://youtube.com/@madsciai"

    # NOTE: If you don"t want to use RSS, comment or delete the following lines
    # Adds an RSS icon to the end of the socials which links to {{ .Site.BaseURL }}/index.xml
    rss_icon = true
    # Which section the RSS icon links to, defaults to all content. See https://gohugo.io/templates/rss/#section-rss
    rss_section = "posts"

    # Hex colors for your sidebar.
    sidebar_bg_color = "#060408" 
    moon_sun_background_color = "#57db7c" 
    moon_sun_color = "#000"                  

    sidebar_a_color = "#ffffff"                 
    sidebar_h1_color = "#ffffff"                
    sidebar_p_color = "#57db7c"        

    sidebar_img_border_color = "#57db7c" 

    sidebar_socials_color = "#eb6bab" 

    # LIGHT MODE COLORS

    code_color = "#000"                      
    code_background_color = "#E5E5E5"       
    code_block_color = "#FFF"                
    code_block_background_color = "#272822"  

    content_bg_color = "#F3F4F3"
    date_color = "#498E74" #498E74       
    link_color = "#eb6bab" 
    list_color = "#60435F" # #60435F  TESTING!
    post_title_color = "#303030"

    table_border_color = "#E5E5E5"          
    table_stripe_color = "#F9F9F9" 
    text_color = "#222" 

    # DARK MODE COLORS

    code_color_dark = "#FFF"                         
    code_background_color_dark = "#498E74"           
    code_block_color_dark = "#FFF"                   
    code_block_background_color_dark = "#272822"     

    content_bg_color_dark = "#121212"                #121212
    date_color_dark = "#57db7c"           
    link_color_dark = "#eb6bab"
    
    list_color_dark = "#F4F1BB"#   TESTING!   #9D9D9D

    post_title_color_dark = "#F3F4F3"   
    
    table_border_color_dark = "#57db7c"     
    table_stripe_color_dark = "#13231D"             
    text_color_dark = "#EEE"                        

[taxonomies]
    tags = "tags"
    category = "categories"
    series = "series"
    tech_stack = "tech_stack"
